<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Hermes</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:            var(--tg-theme-bg-color,            #1c1c1e);
    --bg2:           var(--tg-theme-secondary-bg-color,  #2c2c2e);
    --text:          var(--tg-theme-text-color,          #f2f2f7);
    --hint:          var(--tg-theme-hint-color,          #8e8e93);
    --link:          var(--tg-theme-link-color,          #0a84ff);
    --btn-bg:        var(--tg-theme-button-color,        #0a84ff);
    --btn-text:      var(--tg-theme-button-text-color,   #ffffff);
    --bubble-user:   var(--tg-theme-button-color,        #0a84ff);
    --bubble-bot:    var(--tg-theme-secondary-bg-color,  #2c2c2e);
    --input-bg:      var(--tg-theme-secondary-bg-color,  #2c2c2e);
    --header-h:      56px;
    --radius:        18px;
    --font:          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  html, body {
    height: 100%; background: var(--bg); color: var(--text);
    font-family: var(--font); font-size: 16px; line-height: 1.45;
    -webkit-font-smoothing: antialiased; overscroll-behavior: none;
  }

  /* ── Layout ── */
  #app { display: flex; flex-direction: column; height: 100%; height: 100dvh; }

  /* ── Header ── */
  #header {
    flex: 0 0 var(--header-h);
    display: flex; align-items: center; gap: 10px; padding: 0 12px;
    background: var(--bg); border-bottom: 1px solid rgba(128,128,128,.15);
    position: relative; z-index: 10;
  }
  #header-avatar {
    width: 36px; height: 36px; border-radius: 50%; background: var(--btn-bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  #header-info { flex: 1; min-width: 0; }
  #header-name { font-weight: 600; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #header-model {
    font-size: 11px; color: var(--hint); white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  #header-model:active { opacity: .6; }
  .hdr-btn {
    background: none; border: none; color: var(--hint);
    padding: 8px; cursor: pointer; border-radius: 8px;
    font-size: 18px; line-height: 1; -webkit-tap-highlight-color: transparent;
  }
  .hdr-btn:active { opacity: .6; }

  /* ── Messages ── */
  #messages {
    flex: 1; overflow-y: auto; padding: 12px 12px 4px;
    display: flex; flex-direction: column; gap: 4px;
    scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
  }
  #messages:empty::after {
    content: "Send a message to start chatting with Hermes.";
    display: block; text-align: center; color: var(--hint); font-size: 14px;
    margin: auto; padding: 40px 20px; align-self: center;
  }
  .msg-row { display: flex; align-items: flex-end; gap: 6px; max-width: 100%; }
  .msg-row.user { flex-direction: row-reverse; }
  .msg-row.bot  { flex-direction: row; }
  .bubble {
    max-width: min(75%, 480px); padding: 9px 13px; border-radius: var(--radius);
    font-size: 15px; word-break: break-word; white-space: pre-wrap; line-height: 1.5;
  }
  .msg-row.user .bubble {
    background: var(--bubble-user); color: var(--btn-text); border-bottom-right-radius: 5px;
  }
  .msg-row.bot .bubble {
    background: var(--bubble-bot); color: var(--text); border-bottom-left-radius: 5px;
  }
  .bubble code { font-family: "SF Mono",Menlo,Consolas,monospace; font-size: 13px; background: rgba(0,0,0,.25); padding: 1px 5px; border-radius: 5px; }
  .bubble pre { background: rgba(0,0,0,.3); border-radius: 10px; padding: 10px 12px; overflow-x: auto; margin: 6px 0; font-size: 12.5px; font-family: "SF Mono",Menlo,Consolas,monospace; white-space: pre; }
  .bubble pre code { background: none; padding: 0; border-radius: 0; }
  .bubble strong { font-weight: 600; } .bubble em { font-style: italic; }
  .bubble a { color: var(--link); text-decoration: none; }
  .bubble h1,.bubble h2,.bubble h3 { font-size: 15px; font-weight: 700; margin: 6px 0 2px; }
  .bubble ul,.bubble ol { padding-left: 18px; margin: 4px 0; }
  .bubble li { margin: 2px 0; }
  .bubble p { margin: 4px 0; } .bubble p:first-child { margin-top: 0; } .bubble p:last-child { margin-bottom: 0; }
  .tool-pill { display: inline-flex; align-items: center; gap: 5px; background: rgba(255,255,255,.08); border-radius: 10px; padding: 3px 9px; font-size: 12px; color: var(--hint); margin: 2px 0; font-family: "SF Mono",Menlo,monospace; }
  .typing-bubble { background: var(--bubble-bot); border-radius: var(--radius); border-bottom-left-radius: 5px; padding: 12px 16px; display: flex; gap: 5px; align-items: center; }
  .typing-bubble span { width: 7px; height: 7px; background: var(--hint); border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing-bubble span:nth-child(2) { animation-delay: .15s; }
  .typing-bubble span:nth-child(3) { animation-delay: .30s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

  /* ── Footer ── */
  #footer {
    flex: 0 0 auto; padding: 8px 10px;
    padding-bottom: max(8px, env(safe-area-inset-bottom));
    background: var(--bg); border-top: 1px solid rgba(128,128,128,.15);
  }
  #input-row { display: flex; align-items: flex-end; gap: 8px; background: var(--input-bg); border-radius: 24px; padding: 6px 6px 6px 14px; }
  #input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-family: var(--font); font-size: 16px; line-height: 1.4; resize: none; max-height: 120px; min-height: 24px; overflow-y: auto; padding: 0; -webkit-appearance: none; }
  #input::placeholder { color: var(--hint); }
  #send-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--btn-bg); border: none; color: var(--btn-text); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity .15s; -webkit-tap-highlight-color: transparent; }
  #send-btn:disabled { opacity: .4; cursor: default; }
  #send-btn:not(:disabled):active { opacity: .75; }
  #send-btn svg { display: block; }

  /* ── Error banner ── */
  #error-banner { display: none; padding: 10px 16px; background: #ff453a22; border: 1px solid #ff453a55; color: #ff453a; font-size: 13px; margin: 8px 12px; border-radius: 10px; }
  #error-banner.show { display: block; }

  /* ── Auth overlay ── */
  #auth-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 100; padding: 32px; text-align: center; }
  #auth-overlay .logo { font-size: 48px; }
  #auth-overlay .title { font-size: 22px; font-weight: 700; }
  #auth-overlay .subtitle { font-size: 15px; color: var(--hint); }
  #auth-overlay .spinner { width: 32px; height: 32px; border: 3px solid rgba(255,255,255,.1); border-top-color: var(--btn-bg); border-radius: 50%; animation: spin .8s linear infinite; }
  #auth-overlay .err { color: #ff453a; font-size: 14px; }
  #auth-overlay .retry-btn { padding: 12px 28px; background: var(--btn-bg); color: var(--btn-text); border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Command autocomplete ── */
  #cmd-popup {
    display: none;
    position: absolute;
    bottom: 100%;
    left: 0; right: 0;
    margin-bottom: 6px;
    background: var(--bg2);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 -4px 24px rgba(0,0,0,.35);
    max-height: 52vh;
    overflow-y: auto;
    z-index: 50;
    -webkit-overflow-scrolling: touch;
  }
  #cmd-popup.visible { display: block; }
  #footer { position: relative; }

  .cmd-category {
    font-size: 10px; font-weight: 700; letter-spacing: .07em;
    text-transform: uppercase; color: var(--hint);
    padding: 8px 14px 3px;
  }
  .cmd-row {
    display: flex; align-items: baseline; gap: 10px;
    padding: 9px 14px; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background .1s;
  }
  .cmd-row:active, .cmd-row.focused { background: rgba(128,128,128,.15); }
  .cmd-name {
    font-size: 14px; font-weight: 600; color: var(--text);
    white-space: nowrap; flex-shrink: 0;
  }
  .cmd-name mark {
    background: none; color: var(--btn-bg); font-weight: 700;
  }
  .cmd-desc {
    font-size: 13px; color: var(--hint);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .cmd-hint {
    font-size: 12px; color: var(--hint); opacity: .65;
    white-space: nowrap; margin-left: auto; flex-shrink: 0;
  }

  /* ── Model Sheet ── */
  #model-overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,.5); align-items: flex-end;
  }
  #model-overlay.open { display: flex; }
  #model-sheet {
    width: 100%; background: var(--bg); border-radius: 20px 20px 0 0;
    max-height: 80dvh; display: flex; flex-direction: column;
    transform: translateY(100%); transition: transform .28s cubic-bezier(.32,1,.23,1);
    padding-bottom: max(12px, env(safe-area-inset-bottom));
  }
  #model-overlay.open #model-sheet { transform: translateY(0); }
  #model-sheet-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px 12px; flex-shrink: 0;
  }
  #model-sheet-title { font-size: 17px; font-weight: 700; }
  #model-sheet-close { background: none; border: none; color: var(--hint); font-size: 22px; cursor: pointer; padding: 4px 8px; -webkit-tap-highlight-color: transparent; }
  #model-list { overflow-y: auto; flex: 1; }

  /* Provider group */
  .provider-group { }
  .provider-label { font-size: 11px; font-weight: 600; color: var(--hint); text-transform: uppercase; letter-spacing: .06em; padding: 10px 20px 4px; }

  .model-row {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 20px; cursor: pointer;
    -webkit-tap-highlight-color: transparent; position: relative;
  }
  .model-row:active { background: rgba(128,128,128,.1); }
  .model-row.active { background: rgba(128,128,128,.08); }
  .model-row.active::after {
    content: "✓"; position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
    color: var(--btn-bg); font-size: 16px; font-weight: 700;
  }
  .model-info { flex: 1; min-width: 0; }
  .model-name { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .model-prices { font-size: 12px; color: var(--hint); margin-top: 2px; }
  .free-badge { display: inline-block; font-size: 10px; font-weight: 600; background: #30d158; color: #000; padding: 1px 6px; border-radius: 20px; margin-left: 6px; vertical-align: middle; }

  /* Loading state for model sheet */
  #model-loading { padding: 32px; text-align: center; color: var(--hint); font-size: 14px; }
  #model-loading .spinner { width: 24px; height: 24px; border: 2px solid rgba(255,255,255,.15); border-top-color: var(--btn-bg); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 12px; }
</style>
</head>
<body>
<div id="auth-overlay">
  <div class="logo">⚡</div>
  <div class="title">Hermes</div>
  <div class="subtitle">Connecting…</div>
  <div class="spinner"></div>
</div>

<div id="app" style="display:none">
  <div id="header">
    <div id="header-avatar">⚡</div>
    <div id="header-info">
      <div id="header-name">Hermes</div>
      <div id="header-model" onclick="openModelSheet()" title="Change model">loading…</div>
    </div>
    <button class="hdr-btn" id="model-btn" onclick="openModelSheet()" title="Change model" aria-label="Change model">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <circle cx="9" cy="9" r="2.5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M9 2v2M9 14v2M2 9h2M14 9h2M3.93 3.93l1.41 1.41M12.66 12.66l1.41 1.41M3.93 14.07l1.41-1.41M12.66 5.34l1.41-1.41" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
    <button class="hdr-btn" id="header-clear" title="Clear chat" aria-label="Clear chat">⌫</button>
  </div>

  <div id="error-banner"></div>
  <div id="messages" role="log" aria-live="polite"></div>

  <div id="footer">
    <div id="cmd-popup" role="listbox" aria-label="Commands"></div>
    <div id="input-row">
      <textarea id="input" rows="1" placeholder="Message…" autocomplete="off"
        autocorrect="on" autocapitalize="sentences" spellcheck="true"></textarea>
      <button id="send-btn" aria-label="Send" disabled>
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M2 9L16 9M16 9L10 3M16 9L10 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- Model selector sheet -->
<div id="model-overlay" onclick="closeModelSheet(event)">
  <div id="model-sheet">
    <div id="model-sheet-header">
      <span id="model-sheet-title">Model</span>
      <button id="model-sheet-close" onclick="closeModelSheet()">✕</button>
    </div>
    <div id="model-list">
      <div id="model-loading"><div class="spinner"></div>Loading models…</div>
    </div>
  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const BASE_URL = window.__HERMES_BASE_URL__ || '';
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); tg.disableVerticalSwipes?.(); }

// ── DOM ───────────────────────────────────────────────────────────────────────
const authOverlay  = document.getElementById('auth-overlay');
const authSubtitle = authOverlay.querySelector('.subtitle');
const authSpinner  = authOverlay.querySelector('.spinner');
const authErrEl    = (() => { const el = document.createElement('div'); el.className='err'; authOverlay.appendChild(el); return el; })();
const appEl        = document.getElementById('app');
const messagesEl   = document.getElementById('messages');
const inputEl      = document.getElementById('input');
const sendBtn      = document.getElementById('send-btn');
const errorBanner  = document.getElementById('error-banner');
const headerStatus = document.getElementById('header-model');
const clearBtn     = document.getElementById('header-clear');
const modelOverlay = document.getElementById('model-overlay');
const modelList    = document.getElementById('model-list');

// ── State ─────────────────────────────────────────────────────────────────────
let authToken = null, sessionId = null, isStreaming = false;
let currentController = null, messages = [];
let currentModel = '', modelData = null;

// ── Auth ──────────────────────────────────────────────────────────────────────
async function authenticate() {
  authSubtitle.textContent = 'Authenticating…';
  authSpinner.style.display = 'block';
  authErrEl.textContent = '';
  const initData = tg?.initData || '';
  try {
    const res = await fetch(`${BASE_URL}/v1/webapp/auth`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({init_data: initData}),
    });
    if (!res.ok) { const b = await res.json().catch(()=>({})); throw new Error(b?.error || `Auth failed (${res.status})`); }
    const data = await res.json();
    authToken = data.token; sessionId = data.session_id;
    if (data.history?.length) { data.history.forEach(m => appendMessage(m.role, m.content, false)); messages = data.history; }
    showApp();
    // Load model info in background
    fetchModels();
  } catch (err) {
    authSpinner.style.display = 'none';
    authSubtitle.textContent = 'Could not connect to Hermes';
    authErrEl.textContent = err.message;
    if (!authOverlay.querySelector('.retry-btn')) {
      const btn = document.createElement('button'); btn.className = 'retry-btn'; btn.textContent = 'Retry';
      btn.onclick = () => { btn.remove(); authenticate(); };
      authOverlay.appendChild(btn);
    }
  }
}
function showApp() { authOverlay.style.display = 'none'; appEl.style.display = 'flex'; inputEl.focus(); }

// ── Model sheet ───────────────────────────────────────────────────────────────
async function fetchModels() {
  try {
    const res = await fetch(`${BASE_URL}/v1/webapp/models?session_id=${encodeURIComponent(sessionId)}`, {
      headers: {'Authorization': `Bearer ${authToken}`}
    });
    if (!res.ok) return;
    const data = await res.json();
    modelData = data.models;
    currentModel = data.current || '';
    updateModelLabel();
  } catch {}
}

function updateModelLabel() {
  if (!currentModel) { headerStatus.textContent = 'model'; return; }
  const m = modelData?.find(x => x.id === currentModel);
  const name = m ? m.name : currentModel.split('/').pop();
  headerStatus.textContent = name;
}

function openModelSheet() {
  modelOverlay.classList.add('open');
  renderModelList();
  if (!modelData) fetchModels().then(renderModelList);
}
function closeModelSheet(e) {
  if (e && e.target !== modelOverlay) return;
  modelOverlay.classList.remove('open');
}

function renderModelList() {
  if (!modelData) return;
  // Group by provider
  const byProvider = {};
  for (const m of modelData) {
    if (!byProvider[m.provider]) byProvider[m.provider] = [];
    byProvider[m.provider].push(m);
  }
  let html = '';
  for (const [prov, models] of Object.entries(byProvider)) {
    html += `<div class="provider-group"><div class="provider-label">${esc(prov)}</div>`;
    for (const m of models) {
      const active = m.id === currentModel ? ' active' : '';
      const freeBadge = m.is_free ? '<span class="free-badge">FREE</span>' : '';
      const priceStr = m.input && m.output
        ? `In: ${esc(m.input)} / Out: ${esc(m.output)} per M tokens`
        : m.input ? `In: ${esc(m.input)} / M` : '';
      html += `
        <div class="model-row${active}" onclick="selectModel('${esc(m.id)}')">
          <div class="model-info">
            <div class="model-name">${esc(m.name)}${freeBadge}</div>
            ${priceStr ? `<div class="model-prices">${priceStr}</div>` : ''}
          </div>
        </div>`;
    }
    html += '</div>';
  }
  modelList.innerHTML = html || '<div id="model-loading">No models available</div>';
}

async function selectModel(modelId) {
  currentModel = modelId;
  updateModelLabel();
  renderModelList();
  closeModelSheet();
  try {
    await fetch(`${BASE_URL}/v1/webapp/model`, {
      method: 'POST',
      headers: {'Authorization': `Bearer ${authToken}`, 'Content-Type': 'application/json'},
      body: JSON.stringify({model: modelId, session_id: sessionId}),
    });
  } catch {}
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Input ─────────────────────────────────────────────────────────────────────
// (input handled by command autocomplete listener above)
// (keydown handled by capture listener in command autocomplete section)
sendBtn.addEventListener('click', send);
clearBtn.addEventListener('click', () => {
  if (isStreaming) { currentController?.abort(); stopStreaming(); }
  messages = []; messagesEl.innerHTML = ''; hideError();
});

// ── Send / stream ─────────────────────────────────────────────────────────────
async function send() {
  const text = inputEl.value.trim();
  if (!text || isStreaming) return;
  inputEl.value = ''; inputEl.style.height = 'auto'; sendBtn.disabled = true; hideError();
  appendMessage('user', text);
  messages.push({role: 'user', content: text});
  const typingRow = appendTyping();
  startStreaming();
  try {
    currentController = new AbortController();
    const res = await fetch(`${BASE_URL}/v1/webapp/chat`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}`},
      body: JSON.stringify({session_id: sessionId, message: text, history: messages.slice(0,-1)}),
      signal: currentController.signal,
    });
    typingRow.remove();
    if (!res.ok) { const b = await res.json().catch(()=>({})); throw new Error(b?.error || `Request failed (${res.status})`); }
    const reader = res.body.getReader(), decoder = new TextDecoder();
    let buf = '', botBubble = null, botText = '';
    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += decoder.decode(value, {stream: true});
      const lines = buf.split('\n'); buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (raw === '[DONE]') break;
        let evt; try { evt = JSON.parse(raw); } catch { continue; }
        if (evt.type === 'delta' && evt.text) {
          botText += evt.text;
          if (!botBubble) { const row = createBotRow(); botBubble = row.querySelector('.bubble'); messagesEl.appendChild(row); }
          renderBubble(botBubble, botText); scrollToBottom();
        } else if (evt.type === 'tool') {
          if (!botBubble) { const row = createBotRow(); botBubble = row.querySelector('.bubble'); messagesEl.appendChild(row); }
          const pill = document.createElement('div'); pill.className = 'tool-pill'; pill.textContent = `⚙ ${evt.name}`; botBubble.appendChild(pill); scrollToBottom();
        } else if (evt.type === 'error') { throw new Error(evt.message || 'Stream error'); }
      }
    }
    if (botText) messages.push({role: 'assistant', content: botText});
  } catch (err) {
    typingRow?.remove();
    if (err.name !== 'AbortError') showError(err.message);
  } finally { stopStreaming(); scrollToBottom(); }
}

function startStreaming() { isStreaming = true; headerStatus.textContent = 'thinking…'; }
function stopStreaming() { isStreaming = false; currentController = null; sendBtn.disabled = inputEl.value.trim() === ''; updateModelLabel(); }

// ── Bubble helpers ────────────────────────────────────────────────────────────
function appendMessage(role, content, scroll=true) {
  if (role === 'user') {
    const row = document.createElement('div'); row.className = 'msg-row user';
    const b = document.createElement('div'); b.className = 'bubble'; b.textContent = content;
    row.appendChild(b); messagesEl.appendChild(row);
  } else {
    const row = createBotRow(); renderBubble(row.querySelector('.bubble'), content); messagesEl.appendChild(row);
  }
  if (scroll) scrollToBottom();
}
function createBotRow() {
  const row = document.createElement('div'); row.className = 'msg-row bot';
  const b = document.createElement('div'); b.className = 'bubble'; row.appendChild(b); return row;
}
function appendTyping() {
  const row = document.createElement('div'); row.className = 'msg-row bot';
  const t = document.createElement('div'); t.className = 'typing-bubble';
  t.innerHTML = '<span></span><span></span><span></span>'; row.appendChild(t);
  messagesEl.appendChild(row); scrollToBottom(); return row;
}

// ── Markdown ──────────────────────────────────────────────────────────────────
function renderBubble(el, text) {
  el.innerHTML = '';
  const segs = []; const re = /```(\w*)\n?([\s\S]*?)```/g; let last=0, m;
  while ((m=re.exec(text))!==null) { if(m.index>last) segs.push({type:'md',src:text.slice(last,m.index)}); segs.push({type:'code',src:m[2]}); last=m.index+m[0].length; }
  if(last<text.length) segs.push({type:'md',src:text.slice(last)});
  segs.forEach(seg => {
    if (seg.type==='code') { const pre=document.createElement('pre'); const code=document.createElement('code'); code.textContent=seg.src.trimEnd(); pre.appendChild(code); el.appendChild(pre); }
    else { el.appendChild(mdToHtml(seg.src)); }
  });
}
function mdToHtml(src) {
  const frag = document.createDocumentFragment();
  src.split(/\n{2,}/).forEach(para => { if(!para.trim()) return; const p=document.createElement('p'); p.innerHTML=inlineMd(para.trim()); frag.appendChild(p); });
  if (!frag.childNodes.length) { const span=document.createElement('span'); span.innerHTML=inlineMd(src); frag.appendChild(span); }
  return frag;
}
function inlineMd(s) {
  s=s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
  s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/__(.+?)__/g,'<strong>$1</strong>');
  s=s.replace(/\*([^*]+)\*/g,'<em>$1</em>').replace(/_([^_]+)_/g,'<em>$1</em>');
  s=s.replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  s=s.replace(/\n/g,'<br>');
  return s;
}

// ── Utilities ─────────────────────────────────────────────────────────────────
function scrollToBottom() { requestAnimationFrame(() => { messagesEl.scrollTop = messagesEl.scrollHeight; }); }
function showError(msg) { errorBanner.textContent = msg; errorBanner.classList.add('show'); }
function hideError() { errorBanner.classList.remove('show'); }

// ── Command autocomplete ──────────────────────────────────────────────────────
const cmdPopup = document.getElementById('cmd-popup');
let allCommands = [];       // [{name, description, category, args_hint, aliases, subcommands}]
let cmdFocusIdx = -1;       // keyboard-focused row index within visible list
let visibleCmds = [];       // currently rendered filtered commands

async function loadCommands() {
  if (allCommands.length || !authToken) return;
  try {
    const res = await fetch(`${BASE_URL}/v1/webapp/commands`, {
      headers: {'Authorization': `Bearer ${authToken}`}
    });
    if (res.ok) {
      const data = await res.json();
      allCommands = data.commands || [];
    }
  } catch {}
}

function getCmdQuery() {
  // Returns the slash-query if input starts with '/', else null.
  // Handles cursor anywhere but only triggers when the text is purely a /command token.
  const val = inputEl.value;
  if (!val.startsWith('/')) return null;
  // Only show popup when the whole value is a /word (no spaces yet mean no args typed)
  const spaceIdx = val.indexOf(' ');
  if (spaceIdx !== -1) return null;  // args mode — hide popup
  return val.slice(1).toLowerCase();  // query without the leading /
}

function renderCmdPopup(query) {
  const q = query ?? '';

  // Filter: match name or aliases that start with query
  const matched = allCommands.filter(cmd => {
    if (q === '') return true;
    if (cmd.name.startsWith(q)) return true;
    if (cmd.aliases.some(a => a.startsWith(q))) return true;
    return false;
  });

  if (!matched.length) { hideCmdPopup(); return; }

  visibleCmds = matched;
  cmdFocusIdx = matched.length > 0 ? 0 : -1;

  // Group by category preserving order
  const groups = {};
  for (const cmd of matched) {
    if (!groups[cmd.category]) groups[cmd.category] = [];
    groups[cmd.category].push(cmd);
  }

  let html = '';
  let rowIdx = 0;
  for (const [cat, cmds] of Object.entries(groups)) {
    html += `<div class="cmd-category">${esc(cat)}</div>`;
    for (const cmd of cmds) {
      const focused = rowIdx === cmdFocusIdx ? ' focused' : '';
      // Bold the matched prefix in the name
      const displayName = q && cmd.name.startsWith(q)
        ? `<mark>/${esc(cmd.name.slice(0, q.length))}</mark>${esc(cmd.name.slice(q.length))}`
        : `/${esc(cmd.name)}`;
      const hint = cmd.args_hint ? `<span class="cmd-hint">${esc(cmd.args_hint)}</span>` : '';
      html += `<div class="cmd-row${focused}" role="option" data-idx="${rowIdx}" data-name="${esc(cmd.name)}" onclick="pickCmd('${esc(cmd.name)}')">
        <span class="cmd-name">${displayName}</span>
        <span class="cmd-desc">${esc(cmd.description)}</span>
        ${hint}
      </div>`;
      rowIdx++;
    }
  }

  cmdPopup.innerHTML = html;
  cmdPopup.classList.add('visible');
  scrollFocusedCmdIntoView();
}

function hideCmdPopup() {
  cmdPopup.classList.remove('visible');
  cmdPopup.innerHTML = '';
  visibleCmds = [];
  cmdFocusIdx = -1;
}

function pickCmd(name) {
  inputEl.value = `/${name} `;
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  sendBtn.disabled = false;
  hideCmdPopup();
  inputEl.focus();
}

function moveCmdFocus(dir) {
  if (!visibleCmds.length) return;
  cmdFocusIdx = (cmdFocusIdx + dir + visibleCmds.length) % visibleCmds.length;
  // Re-render focused state without full re-render (just toggle class)
  cmdPopup.querySelectorAll('.cmd-row').forEach((el, i) => {
    el.classList.toggle('focused', i === cmdFocusIdx);
  });
  scrollFocusedCmdIntoView();
}

function scrollFocusedCmdIntoView() {
  const focused = cmdPopup.querySelector('.cmd-row.focused');
  if (focused) focused.scrollIntoView({block: 'nearest'});
}

// Hook into input events
inputEl.addEventListener('input', () => {
  const q = getCmdQuery();
  if (q !== null) {
    loadCommands().then(() => renderCmdPopup(q));
  } else {
    hideCmdPopup();
  }
  // Existing height + sendBtn logic
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  sendBtn.disabled = inputEl.value.trim() === '' || isStreaming;
});

// Override keydown for arrow/enter navigation inside popup
inputEl.addEventListener('keydown', e => {
  if (cmdPopup.classList.contains('visible')) {
    if (e.key === 'ArrowDown')  { e.preventDefault(); moveCmdFocus(+1); return; }
    if (e.key === 'ArrowUp')    { e.preventDefault(); moveCmdFocus(-1); return; }
    if (e.key === 'Tab')        { e.preventDefault(); if (visibleCmds[cmdFocusIdx]) pickCmd(visibleCmds[cmdFocusIdx].name); return; }
    if (e.key === 'Escape')     { hideCmdPopup(); return; }
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (cmdFocusIdx >= 0 && visibleCmds[cmdFocusIdx]) {
        pickCmd(visibleCmds[cmdFocusIdx].name);
      } else if (!sendBtn.disabled) {
        send();
      }
      return;
    }
  } else {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!sendBtn.disabled) send(); }
  }
}, true);  // capture so it runs before the existing listener

// Close popup if user taps outside
document.addEventListener('pointerdown', e => {
  if (!cmdPopup.contains(e.target) && e.target !== inputEl) hideCmdPopup();
});

// ── Boot ──────────────────────────────────────────────────────────────────────
authenticate();
</script>
</body>
</html>
